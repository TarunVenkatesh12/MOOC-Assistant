          - paragraph [ref=e50]: Salut à tous,
          - paragraph [ref=e51]: Bon! Je vous livre une petite astuce que je fais pour avoir la galaxia connectée dès le reboot.
          - paragraph [ref=e52]: (ce n'est pas la trouvaille du siècle, mais ça peut servir)
          - paragraph [ref=e53]: "J'ai fait un module mywifi.py qui contient le code suivant:"
          - code [ref=e55]: "def do_connect(): import network as net import time itf = net.WLAN(net.STA_IF) itf.active(True) if itf.isconnected(): print('Already connected') else: itf.connect('ssid', 'keypass') while not itf.isconnected(): print('.',end='') time.sleep(0.5) return itf.ifconfig()[0] print(do_connect())"
          - paragraph [ref=e56]: que j'ai déposé directement sur l'espace de la galaxia. (Mettre votre SSID et clé wifi)
          - paragraph [ref=e57]: Puis j'ai édité le fichier boot.py, en y ajoutant
          - code [ref=e59]: import mywifi
