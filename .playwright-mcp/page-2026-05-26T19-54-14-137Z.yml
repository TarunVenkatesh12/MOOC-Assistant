          - paragraph [ref=e72]: Bonjour,
          - paragraph [ref=e73]: A priori le cours indique que le simulateur va fournir des données fictives, mais pour avoir des vraies informations il te faut un ESP32 avec wifi (une dizaine d'euros) et tu peux te connecter à ta box avec le code du cours et faire des get sur internet.
          - paragraph [ref=e74]: Tu peux programmer gratuitement ton ESP32 en micro python avec par exemple l'ide Thonny.
          - paragraph [ref=e75]: Tu peux visualiser les infos sur la console du pc mais tu peux aussi ajouter un afficheur oled (moins de 10€) branché en I2C sur l'esp32.
          - paragraph [ref=e76]: A quelques détails près (bibliothèques) le code à écrire sera identique à celui des cours (la Galaxia contient aussi un ESP32 mais avec une surcouche logicielle et matérielle pour. "faciliter" ? l'apprentissage) mais moyennant qq efforts tu peux être autonome.
