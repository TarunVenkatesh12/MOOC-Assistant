        - generic [ref=e49]:
          - paragraph [ref=e50]: Bonjour à tous,
          - paragraph [ref=e51]
          - paragraph [ref=e52]: J'ai une petite amélioration sur cette fonction, qui sert à gérer l'angle pour un servomoteur connecté au port Grove, qui évite la levée d'une Exception. Il suffit de contraindre la valeur de "angle" fournie entre les limites 0 et 180° avec un min+max
          - paragraph [ref=e53]
          - code [ref=e55]: "def setServoAngle(pin, angle): angle = min(max(angle, 0), 180) pin.duty_u16(int(0.025*65535 + (angle*0.1*65535)/180))"
          - paragraph [ref=e56]: Plutôt que
          - code [ref=e58]: "def setServoAngle(pin, angle): if (angle >= 0 and angle <= 180): pin.duty_u16(int(0.025*65535 + (angle*0.1*65535)/180)) else: raise ValueError(\"Servomotor angle have to be set between 0 and 180\")"
