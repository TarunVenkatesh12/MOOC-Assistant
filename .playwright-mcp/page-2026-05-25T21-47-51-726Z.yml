          - paragraph [ref=e82]: Bonjour
          - paragraph [ref=e83]: c'est effectivement une bonne amélioration logicielle
          - paragraph [ref=e84]: Cependant côté mécanique le servo n'ira pas plus loin en termes d'angle et de durées d'impulsion que ce qu'il peut mécaniquement faire (il va "grogner" à chaque limite si on lui demande d'aller au-delà).
          - paragraph [ref=e85]: Avec un nouveau servo il faut d'abord étalonner ses limites (le servo ne parle pas en angle mais en durée d'impulsion et il faut connaître ses valeurs limites mini et maxi de durée d'impulsions qu'il va supporter sans grogner et à quelles positions ça correspond) et ensuite lui envoyer des commandes de mouvement à l'intérieur de ces limites (sur certaines documentions ces durées d'impulsion limites sont indiquées).
          - paragraph [ref=e86]: Il existe des bibliothèques de commande de servo qui gèrent tout çà (je ne sais pas ce qui est présent dans la Galaxia).
          - paragraph [ref=e87]
