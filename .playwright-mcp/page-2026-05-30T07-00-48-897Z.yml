        - generic [ref=e122]:
          - paragraph [ref=e123]: Si ça peut aider pour la Galaxia (que je n'ai pas) voici une copie du code illustrant les interruptions dans le MOOC précédent (mais session 2023, je n'étais pas inscrit à la session 2024).
          - paragraph [ref=e124]: A noter que les "puristes" ne mettent rien d'autre dans un callback (fonction appelée par l'interruption) que le changement d'état d'un flag.
          - heading "Exemple¶" [level=2] [ref=e125]:
            - text: Exemple
            - link "¶" [ref=e126] [cursor=pointer]:
              - /url: https://imt-atlantique.github.io/micropython_doc/capteurs/bouton_avec_interruption/?embed=1#exemple
          - paragraph [ref=e127]: "Dans l'exemple ci-dessous, nous allons faire clignoter la LED RGB de la Galaxia en rouge pendant 1 seconde puis en bleue pedant une seconde. Si le bouton A est appuyé puis relâché (cet événement est appelé une interruption) alors la LED RGB passera en verte pendant une seconde :"
          - paragraph [ref=e128]:
            - strong [ref=e129]: Exemple avec des blocs Exemple avec du code
          - code [ref=e131]:
            - code [ref=e132]: "# On importe les modules dont on a besoin import utime from thingz import * def bouton_A_relache(button): # On passe la LED RGB à verte led.set_colors(0, 100, 0) utime.sleep(1) # On accroche l'interruption à la fonction bouton_A_relache button_a.on_button_pressed(bouton_A_relache) while True: # On passe la LED RGB à rouge led.set_colors(100, 0, 0) utime.sleep(1) # On passe la LED RGB à bleue led.set_colors(0, 0, 100) utime.sleep(1)"
