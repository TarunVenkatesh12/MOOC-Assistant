          - paragraph [ref=e116]
          - code [ref=e118]: "from machine import * from thingz import * import network import utime import urequests station = None apikey = 'votre_clé_api' ssid = 'mon_reseau' password = 'mon_mot_de_passe' def connect_station(ssid='', password='', ip='', mask='', gateway=''): global station station = network.WLAN(network.STA_IF) if station.isconnected(): if station.config('essid') is ssid: print(\"Already connected on ssid: '%s'\" % station.config('essid')) return else: disconnect_station() print(\"\\nTrying to connect to '%s' ...\" % ssid) if len(ip) is not 0: if len(gateway) == 0: gateway = ip.split('.')[0] + '.' + ip.split('.')[1] + '.' + ip.split('.')[2] + '.1' if len(mask) == 0: mask = '255.255.255.0' station.ifconfig([ip, mask, gateway, gateway]) if not station.active(): station.active(True) station.connect(ssid, password) while not station.isconnected(): pass print(\"Station connected !\") def disconnect_station(): if station is not None and station.isconnected(): ssid = station.config('essid') station.disconnect() for retry in range(100): connected = station.isconnected() if not connected: break utime.sleep(0.1) if not connected: station.active(False) utime.sleep(0.2) print(\"Disconnected from '%s'\\n\" %ssid) else: print(\"Disconnection from '%s' failed.\\n\" %ssid) else: print(\"Station already disconnected.\\n\") connect_station(ssid=ssid, password=password) url = \"http://emoncms.fr/input/post\" while True: if station.isconnected(): url = \"http://emoncms.fr/input/post?\" data = { \"node\": \"mooc\", \"data\": '{\"power1\":100,\"power2\":200,\"power3\":300}', \"apikey\": apikey } data_encoded = '&'.join(k+\"=\"+data[k] for k in data) r = urequests.request(method='POST', url=url, data=data_encoded) # Print the response from the server print(r.text()) if r.text() == 'ok': led.set_colors(0, 100, 0) utime.sleep(0.1) led.set_colors(0, 0, 0) utime.sleep(10)"
