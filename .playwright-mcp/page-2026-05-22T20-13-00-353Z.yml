        - generic [ref=e79]:
          - paragraph [ref=e80]: Bonsoir, les microcontrôleurs recourent généralement à une RTC (Real Time clock) externe pour gérer heure et calendrier (avec une pile bouton de sauvegarde)
          - paragraph [ref=e81]: L'esp32 possède une RTC intégrée (donc la Galaxia doit en avoir une), avec une librairie permettant d'initialiser l'heure/date et d'obtenir heure/jour courant.
          - paragraph [ref=e82]: La RTC permet à un microcontrôleur isolé (sans connexion) de savoir où il se situe dans le temps (sortie de veille, horodatage, ...)
          - paragraph [ref=e83]: Cette horloge peut se mettre à jour "manuellement lors d'une maintenance ou via internet si réseau disponible de temps en temps
          - paragraph [ref=e84]
          - paragraph [ref=e85]: Pour ce qui est de la fréquence d'horloge interne, 240Mhz est la fréquence maxi. Mais peut être pas besoin qu'elle tourne "à fond" pour une Galaxia (éviter surchauffe et surconsommation).
          - paragraph [ref=e86]: Pour la régler au démarrage vous avez vu qu'il y a un boot.py.
          - paragraph [ref=e87]
          - paragraph [ref=e88]: Voilà encore de quoi réfléchir !
          - paragraph [ref=e89]
