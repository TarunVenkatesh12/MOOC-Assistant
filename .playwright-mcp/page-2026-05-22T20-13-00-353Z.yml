        - generic [ref=e49]:
          - paragraph [ref=e50]: Bonjour,
          - paragraph [ref=e51]
          - paragraph [ref=e52]: Par curiosité, est-il possible de mettre à l'heure la carte (lorsqu'elle est connectée bien sûr) et de lui faire conserver?
          - paragraph [ref=e53]:
            - emphasis [ref=e54]: (un peu comme dans le BIOS d'un PC)
          - paragraph [ref=e55]:
            - emphasis [ref=e56]: Perso je pense que non; ça n'a pas trop d'intérêt a priori! Je me suis posé la question, car j'ai fait un localtime() en manipulant sur la console REPL et, bien sûr, j'étais à l'EPOCH.
          - paragraph [ref=e57]
          - paragraph [ref=e58]: D'autre part ayant eu la curiosité de regarder les méthodes du package "machine", j'ai constaté qu'il existe une méthode "freq" qui lit ou écrit la fréquence CPU.
          - paragraph [ref=e59]: Sur ma Galaxia j'obtiens 160MHz, alors qu'elle est vendue pour 240MHz (on peut d'ailleurs avec cette méthode fixer cette valeur, qui disparait dès qu'on la débranche!)
          - paragraph [ref=e60]: Est-ce normal?
