          - paragraph [ref=e155]: Ce module est envoyé sur la carte Galaxia lorsque vous téléversez votre programme sur votre Galaxia.
          - paragraph [ref=e156]
          - paragraph [ref=e157]: "Je remets le code ci-dessous :"
          - paragraph [ref=e158]
          - code [ref=e160]:
            - text: import machine import time
            - generic [ref=e161]: "class Linky:"
            - generic [ref=e162]:
              - text: def __init__(
              - generic [ref=e163]: self, pin, unit = False
              - text: "):"
            - text: "self.unit = unit self.data = { 'HCHC': [6,'Wh','', False], # indexe heure creuses (Wh) 'HCHP': [6,'Wh','', False], # indexe heures pleines (Wh) 'BASE': [6,'Wh','', False], # indexe base (Wh) 'PAPP': [5,'W','', False], # puissance apparante (W) 'ISOUSC': [2,'A','', False], # intensite souscrite (A) 'PTEC': [2,'','', False], # priode tarrifaire en cours 'OPTARIF':[4,'','', False], # option tarrifaire } self.uart = machine.UART(1) self.uart.init(baudrate=1200, bits=7, parity=0, stop=1, rx=pin)"
            - generic [ref=e164]: "def __is_data_updated(self):"
            - text: "for index in self.data: if self.data[index][3] == False: return False return True"
            - generic [ref=e165]: "def update_values(self):"
            - text: "retry = 0 for index in self.data: self.data[index][3] = False while not self.__is_data_updated() and retry < 20: buff = self.uart.read(128) if buff: for index in self.data: start = buff.find(b'\\n'+index) data_start = start+len(index)+2 data_end = data_start + self.data[index][0] if start >= 0 and data_end < len(buff): self.data[index][2] = buff[data_start : data_end].decode() self.data[index][3] = True retry+=1"
            - generic [ref=e166]: "def get_data(self, index):"
            - text: "self.update_values() if index: if self.unit: return self.data[index][2]+\" \"+self.data[index][1] else: return self.data[index][2] else: d = {} for index in self.data: d[index] = [self.data[index][2], self.data[index][1]] return d"
