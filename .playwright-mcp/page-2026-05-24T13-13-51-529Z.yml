        - generic [ref=e49]:
          - paragraph [ref=e50]: Bonjour,
          - paragraph [ref=e51]: Nouveau dans le domaine du microcontrolleur, je m'évertue à essayer de comprendre comment tout s'emboite. Si j'ai une bonne vision générale, c'est un peu plus délicat dès que je creuse un peu.
          - paragraph [ref=e52]: Je tombe tout d'abord sur la doc du MOOC (https://imt-atlantique.github.io/micropython_doc/) qui trace à grands traits le principe. C'est bien pour mettre le pied à l'étrier. Mais les détails manquent rapidement (en particuliers dans la description du module thingz).
          - paragraph [ref=e53]:
            - text: Constatant qu'il y a une console, venant du monde python, je me dis "chouette", avec dir() et help(), je vais avoir des infos. Désillusion, le dir(thingz) ne donne pas du tout le même résultat que le dir
            - link "ici" [ref=e54] [cursor=pointer]:
              - /url: https://imt-atlantique.github.io/micropython_doc/thingz/thingz/
            - text: . De plus les help pour button_x et touch_x ne fournissent pas les bons attributs.
          - paragraph [ref=e55]: Autre source d'information, la page thingz elle-même. A priori, chez le constructeur, on se dit qu'on va trouver du sérieux... Même pas; ça donne l'impression que la doc n'est pas à jour.
          - paragraph [ref=e56]: Tout ça pour trouver quelle fonction utiliser sur les touches du pad (bon! j'ai trouvé avec l'interface blocs vittascience - is_touched; chez thingz, impossible de trouver d'objet pad ou touches, juste bouton; quant à la console, c'est is_pressed dans tous les cas, car les touches du pad sont des Button!
          - paragraph [ref=e57]
          - paragraph [ref=e58]: L'autre question que je n'ai pas encore résolue, est à propos de l'écran; n'étant pas encore en possession du galaxia, je navigue et suppute à partir des outils de simulation, alors ce n'est pas brillant; et ça me crispe. Je cherchais à savoir comment effacer l'écran, et savoir si il fallait le faire ou si c'était implicite dans la gestion des appels??? (je suis sur la réalisation du "menu SNCF" de la fin de 1ère semaine)
          - paragraph [ref=e59]
          - paragraph [ref=e60]: Désolé d'être aussi exigeant, mais j'ai (sans doute) trop l'habitude de me débrouiller tout seul, et là je n'y arrive pas.
          - paragraph [ref=e61]: Il est vraisemblable que je sois passé à côté de trucs.
          - paragraph [ref=e62]: Merci pour toute aide
