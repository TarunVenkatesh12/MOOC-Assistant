          - paragraph [ref=e131]: "Dernières investigations:"
          - paragraph [ref=e132]: J'ai re-flashé la version 2.0.0 micropython sur la galaxia, et lorsque j'effectue une requête (GET), elle ne reboot plus sur requête HTTP (reboot seulement en HTTPS), mais elle se plante. Et à l'endroit que j'avais localisé lors des reboots.
          - paragraph [ref=e133]: "J'ai ce message:"
          - code [ref=e135]: "Traceback (most recent call last): File \"<stdin>\", line 1, in <module> File \"requests/__init__.py\", line 201, in get File \"requests/__init__.py\", line 79, in request OSError: -202"
          - code [ref=e137]: "[INFO] Impossible d'accéder à Internet. Veuillez vérifier votre adresse IP et votre passerelle dans la fonction Connect Station."
          - code [ref=e139]:
            - text: "[HELP] To find the gateway of network on Windows, use"
            - strong [ref=e140]: ipconfig
            - text: command in a prompt.
          - paragraph [ref=e141]: "et l'endroit incriminé (ligne 79 du module requests) dans les 2 cas est:"
          - code [ref=e143]: ai = socket.getaddrinfo(host, port, 0, socket.SOCK_STREAM)
          - paragraph [ref=e144]: Sinon, je confirme que la carte est bien connectée en wifi; (je peux le voir sur le DNS de la box)
          - paragraph [ref=e145]: "C'est donc au niveau de la carte qu'il ne sait/peux pas ouvrir de socket de connexion pour une raison mystérieuse! J'abdique pour aujourd'hui, je rechercherai demain la signification de l'erreur OSError: -202."
