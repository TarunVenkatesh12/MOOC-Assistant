          - paragraph [ref=e50]: Bonjour,
          - paragraph [ref=e51]
          - paragraph [ref=e52]: J'ai reçu le kit Vittascience hier et depuis je suis parti à la découverte. C'est mieux de tester en vrai!
          - paragraph [ref=e53]: J'ai passé en revue les exercices du cours 1 (allumer une led, faire tourner un servo...). Amusant. (je suis totalement néophyte dans ce domaine)
          - paragraph [ref=e54]
          - paragraph [ref=e55]: "[Vu] Mais, 1e question: en utililsant l'interface vittascience pour uploader les programmes, la carte redémarre systématiquement à l'issu du chargement."
          - paragraph [ref=e56]: Est-ce un comportement normal/voulu?
          - paragraph [ref=e57]:
            - text: "[EDIT]"
            - emphasis [ref=e58]: "Bon là! J'ai compris en étudiant la trace lors de l'upload: il y a un machine.reset()"
          - paragraph [ref=e59]
          - paragraph [ref=e60]: Aujourd'hui j'ai voulu tester les aspects réseau Wifi. Scan et connexion OK! quand je fais en pas à pas avec la console ou en programmation
          - paragraph [ref=e61]: Mais en voulant tester le programme d'acquisition de l'heure, la carte redémarre systématiquement après la connexion au réseau Wifi. Le GET n'est jamais exécuté, soit ça redémarre avant, ou pendant l'exécution.
          - paragraph [ref=e62]: Est-ce un problème de la carte Galaxia (mémoire ou wifi)?
          - paragraph [ref=e63]: "[EDIT] Voir mes autres posts car j'ai un peu avancé depuis... mais sans trouver la panne!"
          - paragraph [ref=e64]
          - paragraph [ref=e65]: Enfin, lorsque le main.py plante et que la carte redémarre, le programme est systématiquement relancé. Je n'ai pas trouvé de moyen d'arrêter ce bouclage infini que de reflasher la carte (malgré que parfois j'arrive à supprimer le fichier main.py quand le navigateur windows apparait à la reconnexion USB.
          - paragraph [ref=e66]
          - paragraph [ref=e67]:
            - text: En attendant mieux, je vais me concentrer sur les activités de la carte sans le réseau.
            - img "😕" [ref=e69]
          - paragraph [ref=e70]:
            - text: "[EDIT] Mais je n'ai pas pu résister"
            - img "😂" [ref=e72]
            - img "😂" [ref=e74]
            - img "😂" [ref=e76]
          - paragraph [ref=e77]
          - paragraph [ref=e78]: J'espère que l'un d'entre vous pourra me partager son expérience pour expliquer mes déboires.
          - paragraph [ref=e79]:
