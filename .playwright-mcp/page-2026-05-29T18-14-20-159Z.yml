        - generic [ref=e324]:
          - paragraph [ref=e325]: Bonjour,
          - paragraph [ref=e326]: "si je peux me permettre une remarque d'ordre général après plusieurs années de pratique en milieu professionnel, votre question n'est pas du tout anodine, car en matière de programmation un problème récurrent émerge avec le cllient (ou ici le vérificateur mais c'est pareil) : a t'on bien compris ce qu'il veut ?"
          - paragraph [ref=e327]: Face à ça il y a 2 types de programmeurs, celui qui va attaquer à coder ce qu'il pense être ce que le client veut, et l'autre qui va aupravant s'assurer de bien traduire en code ce que le client veut (ou a exprimé ce qui n'est pas toujours la même chose !)
          - paragraph [ref=e328]: Le premier comportement va donner lieu à d'âpres discussions pour savoir qui a mal compris ou qui s'est mal expliqué, à des retours, des corrections, ... bref des pertes de temps et d'argent.
          - paragraph [ref=e329]: Le deuxième comportement peut être considéré par certains comme fastidieux, mais au final sera celui qui répondra le plus fidèlement au besoin.
          - paragraph [ref=e330]: Entre les 2 il faut savoir trouver le juste milieu, en fonction de la situation. Un des langages commun à peu près compréhensible par tout le monde est l'algorithme (ce qu'on fait, ce que le système répond, les branches de décision avec tables de vérité, ...). Mais n'attendez pas du client qu'il vous écrive l'algorithme ! mais ça peut être un support contractuel dans les spécifications détaillées.
          - paragraph [ref=e331]: C'est donc bien un vaste sujet en matière de programmation, merci d'avoir lu jusqu'au bout !
          - paragraph [ref=e332]
          - paragraph [ref=e333]
