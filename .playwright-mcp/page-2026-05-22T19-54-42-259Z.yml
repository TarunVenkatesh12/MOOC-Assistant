        - generic [ref=e49]:
          - paragraph [ref=e50]: Il y a quelque chose qui m'échappe et qui m'agace avec cet interface à propos du module time.
          - paragraph [ref=e51]: Je débute sur µPython et j'ai bien pris la peine de parcourir le site micropython français (et un peu l'original anglais).
          - paragraph [ref=e52]: Or il est bien fait mention que la plupart des modules standard sont précédés de la lettre 'u' (comme utime, uos, usys par exemple).
          - paragraph [ref=e53]: Alors dites moi pourquoi l'IDE France IOI s'évertue à interdire la référence à utime (module inconnu) et force l'utilisation de time qui lui ne devrait pas être connu de µPython.
          - paragraph [ref=e54]: (ce qui n'est pas le cas de l'IDE Vittascience)
          - paragraph [ref=e55]
          - paragraph [ref=e56]: D'autre part, dans les 2 premiers exos proposés en révision (et que j'ai eu beaucoup de soucis à réaliser, puisque je n'ai pas le background du premier MOOC - je réitère ma demande pour avoir un accès SVP - et encore moins en électronique! Heureusement, je touche ma bille en programmation ;) je n'ai pas compris ce qu'était cette histoire de limitation de blocs; à quoi ça correspond.
          - paragraph [ref=e57]
          - paragraph [ref=e58]: Voila, je suis preneur de toute explication sur mes interrogations.
          - paragraph [ref=e59]: Merci
