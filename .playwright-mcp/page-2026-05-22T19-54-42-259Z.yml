          - paragraph [ref=e88]: Je comprends bien votre agacement que je partage !
          - paragraph [ref=e89]: "La disparition du 'u' devant le nom des modules est un choix de la communauté micropython en juin 2024 qui ont décidé d'enlever les `u` devant tous les modules micropython pour faciliter le portage de python vers micropython : utime est devenu time, ujson est devenu json, urequests est devenu requests..."
          - paragraph [ref=e90]
          - paragraph [ref=e91]: "Du coup, nous avons transmis l'annonce aux développeurs de l'interface France-IOI : https://github.com/micropython/micropython-lib/commit/84ba4521139157d284015de6b530c13a062caf74"
